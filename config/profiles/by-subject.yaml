# ============================================================
# DS FolderFit — 정리 프로필 #2: 주제/프로젝트 기반 (Subject-Based)
# ============================================================
# 추천 대상: 업무 폴더, 개인 문서 폴더, 협업 공유 폴더
# 핵심 원리: 목적·맥락 중심으로 분류하여 파일의 "의미"로 접근
#
# 폴더 구조 예시:
#   업무/
#   ├── 보고서/
#   │   └── 2026_Q1_실적보고서.xlsx
#   ├── 회의록/
#   │   └── 260327_기획회의.docx
#   ├── 참고자료/
#   │   └── 디자인가이드.pdf
#   개인/
#   ├── 사진/
#   ├── 취미/
#   └── 영수증/
# ============================================================

profile:
  name: "주제/프로젝트 기반"
  id: "by-subject"
  description: "목적·맥락별 분류, 협업 환경에 최적화된 범용 방식"
  rank: 2
  best_for:
    - "업무/프로젝트 폴더"
    - "개인 문서 보관함"
    - "팀 공유 드라이브"

# 정리 방식 설정
organize:
  mode: "by-type"          # 커스텀 카테고리 규칙을 적용하므로 by-type 사용
  date_mode: null

# 생성일 접두사 리네임 — 같은 주제 안에서 시간 순서 유지
rename:
  enabled: true
  date_format: "YYMMDD"    # 짧은 포맷으로 파일명 길이 절약
  date_source: "created"
  skip_existing: true

# 중복 파일 처리
duplicates:
  enabled: true
  action: "report"         # 업무 파일은 자동 삭제 대신 리포트만
  hash_algorithm: "xxhash64"
  verify_with_sha256: true # 업무 파일 — 정밀 검증 권장

# 감시 모드 — 업무 폴더는 수동 실행 권장
watch:
  enabled: false
  delay: 2.0
  exclude_patterns:
    - "*.tmp"
    - "~$*"              # MS Office 임시 잠금 파일
    - "*.lnk"
    - "desktop.ini"

# 폴더 분석 설정
analyze:
  large_file_threshold_mb: 200   # 업무 파일 기준 낮게 설정
  old_file_days: 365

# ★ 주제/프로젝트 기반 커스텀 분류 규칙
# 파일명 패턴(pattern) + 확장자(extensions) 조합으로 의미 기반 분류
categories:

  # ── 업무 문서 ──────────────────────────────────────────────
  - name: "보고서"
    extensions: [.pdf, .docx, .doc, .pptx, .ppt, .hwp, .hwpx]
    patterns:
      - "*보고서*"
      - "*report*"
      - "*Report*"
      - "*결과*"
      - "*발표*"
    target_folder: "업무/보고서"

  - name: "회의록"
    extensions: [.docx, .doc, .txt, .md, .hwp]
    patterns:
      - "*회의*"
      - "*meeting*"
      - "*Meeting*"
      - "*minutes*"
      - "*agenda*"
    target_folder: "업무/회의록"

  - name: "계약·법무"
    extensions: [.pdf, .docx, .doc, .hwp]
    patterns:
      - "*계약*"
      - "*협약*"
      - "*계획서*"
      - "*제안서*"
      - "*견적*"
      - "*invoice*"
    target_folder: "업무/계약-법무"

  - name: "스프레드시트"
    extensions: [.xlsx, .xls, .csv, .ods]
    patterns:
      - "*현황*"
      - "*목록*"
      - "*집계*"
      - "*통계*"
      - "*예산*"
    target_folder: "업무/데이터-표"

  # ── 미디어·개인 ────────────────────────────────────────────
  - name: "사진"
    extensions: [.jpg, .jpeg, .png, .heic, .raw, .cr2, .nef, .dng]
    mime_types: ["image/*"]
    patterns: []
    target_folder: "개인/사진"

  - name: "동영상"
    extensions: [.mp4, .avi, .mkv, .mov, .wmv, .webm, .m4v]
    mime_types: ["video/*"]
    patterns: []
    target_folder: "개인/동영상"

  - name: "음악"
    extensions: [.mp3, .wav, .flac, .aac, .ogg, .m4a]
    mime_types: ["audio/*"]
    patterns: []
    target_folder: "개인/음악"

  # ── 참고자료 ───────────────────────────────────────────────
  - name: "참고자료"
    extensions: [.pdf, .epub, .docx, .txt, .md]
    patterns:
      - "*가이드*"
      - "*매뉴얼*"
      - "*manual*"
      - "*guide*"
      - "*tutorial*"
      - "*참고*"
    target_folder: "참고자료"

  # ── 설치·압축 ─────────────────────────────────────────────
  - name: "설치파일"
    extensions: [.exe, .msi, .dmg, .pkg, .deb, .rpm, .appimage]
    patterns: []
    target_folder: "설치파일"

  - name: "압축파일"
    extensions: [.zip, .rar, .7z, .tar, .gz, .bz2, .xz]
    patterns: []
    target_folder: "압축파일"

  # ── 개발·코드 ─────────────────────────────────────────────
  - name: "코드·스크립트"
    extensions:
      [.py, .js, .ts, .java, .cs, .go, .rs, .sh, .bat, .ps1, .ipynb]
    patterns:
      - "*.py"
      - "*.js"
    target_folder: "개발/코드"
